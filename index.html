<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080808" />
  <title>Desafio da Sorte</title>

  <style>
    :root {
      --gold: #d7aa3d;
      --gold-light: #fff0a6;
      --gold-dark: #7f5b13;
      --black: #070707;
      --panel: rgba(20, 20, 20, 0.94);
      --text: #fffaf0;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 10%, rgba(215,170,61,.18), transparent 35%),
        radial-gradient(circle at 15% 85%, rgba(215,170,61,.10), transparent 30%),
        linear-gradient(145deg, #020202, #111 55%, #050505);
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 14px;
    }

    .app {
      width: min(100%, 820px);
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .title {
      margin: 0 0 8px;
      font-size: clamp(2rem, 7vw, 4.4rem);
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--gold-light);
      text-shadow:
        0 0 10px rgba(255, 226, 123, .45),
        0 0 28px rgba(215, 170, 61, .35);
    }

    .subtitle {
      margin: 0 0 26px;
      color: #d6d0c4;
      font-size: clamp(.95rem, 3vw, 1.15rem);
    }

    .machine {
      position: relative;
      padding: clamp(18px, 4vw, 34px);
      border: 2px solid var(--gold);
      border-radius: 30px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.035), rgba(0,0,0,.30)),
        var(--panel);
      box-shadow:
        0 0 0 5px rgba(215,170,61,.08),
        0 22px 60px rgba(0,0,0,.72),
        inset 0 0 30px rgba(215,170,61,.06);
      overflow: hidden;
    }

    .machine::before,
    .machine::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,220,115,.16), transparent 65%);
      pointer-events: none;
    }

    .machine::before { left: -120px; top: -120px; }
    .machine::after { right: -120px; bottom: -120px; }

    .lights {
      position: absolute;
      inset: 8px;
      border: 1px dashed rgba(255, 226, 123, .55);
      border-radius: 23px;
      pointer-events: none;
      animation: glow 1.5s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { opacity: .4; filter: drop-shadow(0 0 3px var(--gold)); }
      to { opacity: 1; filter: drop-shadow(0 0 11px var(--gold-light)); }
    }

    .reels {
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(8px, 2vw, 18px);
      margin: 16px 0 26px;
      z-index: 1;
    }

    .reel {
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: hidden;
      border: 3px solid var(--gold);
      background: #111;
      box-shadow:
        inset 0 0 18px rgba(0,0,0,.9),
        0 0 18px rgba(215,170,61,.18);
      position: relative;
    }

    .reel::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,.12), transparent 22%, transparent 78%, rgba(0,0,0,.25));
      pointer-events: none;
    }

    .reel img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform .12s ease, filter .12s ease;
    }

    .reel.spinning img {
      transform: scale(1.08);
      filter: blur(1.2px) brightness(1.1);
    }

    .spin-button,
    .claim-button,
    .play-again {
      border: 0;
      border-radius: 999px;
      padding: 17px 38px;
      font-size: clamp(1rem, 4vw, 1.35rem);
      font-weight: 900;
      letter-spacing: .06em;
      text-transform: uppercase;
      cursor: pointer;
      color: #1a1203;
      background: linear-gradient(180deg, #fff2a2, #d7aa3d 55%, #a67617);
      box-shadow:
        0 7px 0 #6f4c0c,
        0 12px 28px rgba(215,170,61,.35),
        inset 0 1px 0 rgba(255,255,255,.8);
      transition: transform .14s ease, filter .14s ease;
    }

    .spin-button:hover,
    .claim-button:hover,
    .play-again:hover {
      filter: brightness(1.08);
      transform: translateY(-2px);
    }

    .spin-button:active,
    .claim-button:active,
    .play-again:active {
      transform: translateY(5px);
      box-shadow:
        0 2px 0 #6f4c0c,
        0 7px 18px rgba(215,170,61,.25);
    }

    .spin-button:disabled {
      cursor: not-allowed;
      opacity: .6;
      transform: none;
    }

    .status {
      min-height: 26px;
      margin-top: 20px;
      color: #e9dfc8;
      font-weight: 700;
      letter-spacing: .02em;
    }

    .shake {
      animation: shake .5s linear;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15% { transform: translateX(-9px) rotate(-.5deg); }
      30% { transform: translateX(8px) rotate(.5deg); }
      45% { transform: translateX(-6px); }
      60% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
    }

    .winner-overlay,
    .prize-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 18px;
      background: rgba(0,0,0,.88);
      backdrop-filter: blur(8px);
    }

    .winner-overlay.show,
    .prize-overlay.show {
      display: flex;
    }

    .winner-card,
    .prize-card {
      width: min(94vw, 680px);
      max-height: 92vh;
      overflow: auto;
      border: 2px solid var(--gold);
      border-radius: 28px;
      background:
        radial-gradient(circle at top, rgba(215,170,61,.18), transparent 45%),
        #0d0d0d;
      padding: clamp(24px, 6vw, 46px);
      box-shadow: 0 0 50px rgba(215,170,61,.38);
      animation: pop .55s cubic-bezier(.2,.9,.2,1.25);
      position: relative;
      z-index: 52;
    }

    @keyframes pop {
      from { transform: scale(.58); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .winner-card h2 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 8vw, 4.5rem);
      color: var(--gold-light);
      text-shadow: 0 0 24px rgba(255,220,115,.5);
    }

    .winner-card p {
      margin: 0 0 28px;
      font-size: clamp(1rem, 4vw, 1.45rem);
      color: #fff;
    }

    .prize-card img {
      width: 100%;
      max-height: 62vh;
      object-fit: contain;
      border-radius: 20px;
      border: 2px solid var(--gold);
      background: #000;
      box-shadow: 0 0 30px rgba(215,170,61,.24);
      animation: revealImage 1.1s ease both;
    }

    @keyframes revealImage {
      from { opacity: 0; transform: scale(.75) rotate(-1deg); filter: blur(10px); }
      to { opacity: 1; transform: scale(1) rotate(0); filter: blur(0); }
    }

    .prize-card h2 {
      color: var(--gold-light);
      margin: 0 0 18px;
      font-size: clamp(1.5rem, 6vw, 3rem);
    }

    .play-again {
      margin-top: 22px;
      padding: 13px 28px;
      font-size: .95rem;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 51;
    }

    .flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 49;
      opacity: 0;
      background: radial-gradient(circle, rgba(255,244,176,.9), rgba(215,170,61,.15), transparent 70%);
    }

    .flash.active {
      animation: flash 1s ease-out;
    }

    @keyframes flash {
      0% { opacity: 0; }
      18% { opacity: 1; }
      100% { opacity: 0; }
    }

    .hint {
      margin-top: 18px;
      color: #928a7b;
      font-size: .82rem;
    }

    @media (max-width: 480px) {
      body { padding: 15px 10px; }
      .machine { border-radius: 22px; }
      .reel { border-radius: 12px; border-width: 2px; }
      .spin-button { width: 100%; }
    }
  </style>
</head>

<body>
  <main class="app">
    <h1 class="title">🍀 Desafio da Sorte</h1>
    <p class="subtitle">Gire a máquina e descubra o que a sorte reservou para você!</p>

    <section class="machine" id="machine">
      <div class="lights"></div>

      <div class="reels">
        <div class="reel"><img id="reel1" src="imagens/simbolo-01.png" alt="Símbolo 1"></div>
        <div class="reel"><img id="reel2" src="imagens/simbolo-02.png" alt="Símbolo 2"></div>
        <div class="reel"><img id="reel3" src="imagens/simbolo-03.png" alt="Símbolo 3"></div>
      </div>

      <button class="spin-button" id="spinButton">Girar</button>
      <div class="status" id="status">Boa sorte!</div>
    </section>

    <p class="hint">Ative o som do celular para aproveitar todos os efeitos.</p>
  </main>

  <div class="flash" id="flash"></div>
  <canvas id="effectsCanvas"></canvas>

  <section class="winner-overlay" id="winnerOverlay">
    <div class="winner-card">
      <h2>Parabéns!</h2>
      <p>Você ganhou o grande prêmio!</p>
      <button class="claim-button" id="claimButton">🎁 Recolher premiação</button>
    </div>
  </section>

  <section class="prize-overlay" id="prizeOverlay">
    <div class="prize-card">
      <h2>Seu grande prêmio</h2>
      <img src="imagens/premio-final.jpg" alt="Imagem do grande prêmio">
      <button class="play-again" id="playAgainButton">Jogar novamente</button>
    </div>
  </section>

  <audio id="finalMusic" preload="auto" src="audios/musica-premio.mp3"></audio>

  <script>
    // ==========================================================
    // CONFIGURAÇÃO DAS IMAGENS
    // ==========================================================
    const symbols = [
      "imagens/simbolo-01.png",
      "imagens/simbolo-02.png",
      "imagens/simbolo-03.png",
      "imagens/simbolo-04.png",
      "imagens/simbolo-05.png",
      "imagens/simbolo-premio.png"
    ];

    // Esta é a imagem que precisa aparecer 3 vezes para ganhar.
    const prizeSymbol = "imagens/simbolo-premio.png";

    // O prêmio será liberado aleatoriamente entre estes giros.
    const MIN_SPINS_TO_WIN = 3;
    const MAX_SPINS_TO_WIN = 6;

    const reels = [
      document.getElementById("reel1"),
      document.getElementById("reel2"),
      document.getElementById("reel3")
    ];

    const reelBoxes = [...document.querySelectorAll(".reel")];
    const spinButton = document.getElementById("spinButton");
    const statusText = document.getElementById("status");
    const machine = document.getElementById("machine");
    const winnerOverlay = document.getElementById("winnerOverlay");
    const prizeOverlay = document.getElementById("prizeOverlay");
    const claimButton = document.getElementById("claimButton");
    const playAgainButton = document.getElementById("playAgainButton");
    const finalMusic = document.getElementById("finalMusic");
    const flash = document.getElementById("flash");

    let spinCount = 0;
    let winningSpin = randomInteger(MIN_SPINS_TO_WIN, MAX_SPINS_TO_WIN);
    let spinning = false;
    let audioContext = null;

    function randomInteger(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function randomSymbol(excludePrize = false) {
      const available = excludePrize
        ? symbols.filter(symbol => symbol !== prizeSymbol)
        : symbols;

      return available[Math.floor(Math.random() * available.length)];
    }

    function ensureAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
    }

    // Efeito sonoro de clique, criado no navegador.
    function playClickSound() {
      ensureAudio();
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();

      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(500, audioContext.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(230, audioContext.currentTime + 0.08);

      gain.gain.setValueAtTime(0.16, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.1);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start();
      oscillator.stop(audioContext.currentTime + 0.11);
    }

    // Som de giro eletrônico, sem precisar de arquivo MP3.
    function playSpinTick(pitch = 190) {
      ensureAudio();
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();

      oscillator.type = "square";
      oscillator.frequency.setValueAtTime(pitch, audioContext.currentTime);

      gain.gain.setValueAtTime(0.045, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.045);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start();
      oscillator.stop(audioContext.currentTime + 0.05);
    }

    // Fanfarra de vitória criada pelo navegador.
    function playVictorySound() {
      ensureAudio();

      const notes = [
        [523.25, 0.00, 0.16],
        [659.25, 0.15, 0.16],
        [783.99, 0.30, 0.18],
        [1046.50, 0.48, 0.52]
      ];

      notes.forEach(([frequency, start, duration]) => {
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();

        oscillator.type = "triangle";
        oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime + start);

        gain.gain.setValueAtTime(0.001, audioContext.currentTime + start);
        gain.gain.exponentialRampToValueAtTime(0.22, audioContext.currentTime + start + 0.025);
        gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + start + duration);

        oscillator.connect(gain);
        gain.connect(audioContext.destination);
        oscillator.start(audioContext.currentTime + start);
        oscillator.stop(audioContext.currentTime + start + duration);
      });
    }

    async function spin() {
      if (spinning) return;

      spinning = true;
      spinCount++;
      spinButton.disabled = true;
      statusText.textContent = "Girando...";
      playClickSound();

      reelBoxes.forEach(box => box.classList.add("spinning"));

      const shouldWin = spinCount >= winningSpin;
      const duration = 2100;
      const startTime = performance.now();
      let lastChange = 0;

      await new Promise(resolve => {
        function animate(now) {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / duration, 1);

          // O giro começa rápido e vai desacelerando.
          const interval = 55 + Math.pow(progress, 3) * 260;

          if (now - lastChange >= interval) {
            reels.forEach(reel => {
              reel.src = randomSymbol();
            });

            playSpinTick(180 + Math.random() * 90);
            lastChange = now;
          }

          if (progress < 1) {
            requestAnimationFrame(animate);
          } else {
            resolve();
          }
        }

        requestAnimationFrame(animate);
      });

      if (shouldWin) {
        reels.forEach(reel => {
          reel.src = prizeSymbol;
        });

        setTimeout(showWinner, 450);
      } else {
        // Evita 3 símbolos iguais por acidente antes do prêmio.
        let result = [randomSymbol(true), randomSymbol(true), randomSymbol(true)];
        while (result[0] === result[1] && result[1] === result[2]) {
          result[2] = randomSymbol(true);
        }

        reels.forEach((reel, index) => {
          reel.src = result[index];
        });

        const remaining = winningSpin - spinCount;
        statusText.textContent = remaining <= 1 ? "Quase! Tente mais uma vez..." : "Não foi dessa vez. Tente novamente!";
      }

      reelBoxes.forEach(box => box.classList.remove("spinning"));
      spinning = false;
      spinButton.disabled = shouldWin;
    }

    function showWinner() {
      statusText.textContent = "GRANDE PRÊMIO!";
      machine.classList.add("shake");
      flash.classList.add("active");
      playVictorySound();
      startCelebration();

      if (navigator.vibrate) {
        navigator.vibrate([180, 80, 180, 80, 450]);
      }

      setTimeout(() => {
        winnerOverlay.classList.add("show");
      }, 550);

      setTimeout(() => {
        machine.classList.remove("shake");
        flash.classList.remove("active");
      }, 1100);
    }

    claimButton.addEventListener("click", async () => {
      playClickSound();
      winnerOverlay.classList.remove("show");
      prizeOverlay.classList.add("show");

      finalMusic.currentTime = 0;
      try {
        await finalMusic.play();
      } catch (error) {
        console.log("O navegador bloqueou a música:", error);
      }

      startCelebration(7000);
    });

    playAgainButton.addEventListener("click", () => {
      playClickSound();
      finalMusic.pause();
      finalMusic.currentTime = 0;
      prizeOverlay.classList.remove("show");

      spinCount = 0;
      winningSpin = randomInteger(MIN_SPINS_TO_WIN, MAX_SPINS_TO_WIN);
      spinButton.disabled = false;
      statusText.textContent = "Boa sorte!";

      reels[0].src = symbols[0];
      reels[1].src = symbols[1];
      reels[2].src = symbols[2];
    });

    spinButton.addEventListener("click", spin);

    // ==========================================================
    // CONFETES E FOGOS
    // ==========================================================
    const canvas = document.getElementById("effectsCanvas");
    const ctx = canvas.getContext("2d");
    let particles = [];
    let animationFrame = null;

    function resizeCanvas() {
      const ratio = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * ratio;
      canvas.height = window.innerHeight * ratio;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function createConfetti(amount = 180) {
      const colors = ["#d7aa3d", "#fff0a6", "#ffffff", "#b47b17", "#ffe168"];

      for (let i = 0; i < amount; i++) {
        particles.push({
          type: "confetti",
          x: Math.random() * window.innerWidth,
          y: -20 - Math.random() * window.innerHeight * 0.25,
          vx: (Math.random() - 0.5) * 4,
          vy: 2 + Math.random() * 5,
          gravity: 0.055 + Math.random() * 0.04,
          rotation: Math.random() * Math.PI,
          rotationSpeed: (Math.random() - 0.5) * 0.25,
          size: 5 + Math.random() * 8,
          color: colors[Math.floor(Math.random() * colors.length)],
          life: 1
        });
      }
    }

    function createFirework(x, y) {
      const colors = ["#fff0a6", "#d7aa3d", "#ffffff", "#ffdf64"];
      const color = colors[Math.floor(Math.random() * colors.length)];

      for (let i = 0; i < 75; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 6.5;

        particles.push({
          type: "spark",
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          gravity: 0.055,
          size: 1.5 + Math.random() * 3,
          color,
          life: 1,
          decay: 0.012 + Math.random() * 0.013
        });
      }
    }

    function startCelebration(duration = 5000) {
      createConfetti();

      const fireworks = setInterval(() => {
        createFirework(
          window.innerWidth * (0.15 + Math.random() * 0.7),
          window.innerHeight * (0.12 + Math.random() * 0.45)
        );
      }, 430);

      setTimeout(() => clearInterval(fireworks), duration);

      if (!animationFrame) animateParticles();
    }

    function animateParticles() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      particles.forEach(particle => {
        particle.x += particle.vx;
        particle.y += particle.vy;
        particle.vy += particle.gravity;

        if (particle.type === "confetti") {
          particle.rotation += particle.rotationSpeed;
          particle.life -= 0.0028;

          ctx.save();
          ctx.translate(particle.x, particle.y);
          ctx.rotate(particle.rotation);
          ctx.globalAlpha = Math.max(particle.life, 0);
          ctx.fillStyle = particle.color;
          ctx.fillRect(-particle.size / 2, -particle.size / 3, particle.size, particle.size * 0.65);
          ctx.restore();
        } else {
          particle.life -= particle.decay;
          ctx.globalAlpha = Math.max(particle.life, 0);
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
        }
      });

      ctx.globalAlpha = 1;

      particles = particles.filter(particle =>
        particle.life > 0 &&
        particle.y < window.innerHeight + 60
      );

      if (particles.length > 0) {
        animationFrame = requestAnimationFrame(animateParticles);
      } else {
        animationFrame = null;
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      }
    }
  </script>
</body>
</html>
